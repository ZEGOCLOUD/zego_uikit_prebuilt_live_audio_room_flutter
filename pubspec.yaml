name: zego_uikit_prebuilt_live_audio_room
description: PrebuiltLiveAudioRoom is a Live Audio Room kit that provides a ready-made group voice chat that supports up to 8 hosts and co-hosts to connect with millions of users downstage.
version: 3.16.6
homepage: https://www.zegocloud.com/
repository: https://github.com/ZEGOCLOUD/zego_uikit_prebuilt_live_audio_room
screenshots:
  - description: "Live Audio Room Kit for pub.dev preview"
    path: images/preview.jpg

environment:
  sdk: ">=3.0.0 <4.0.0"
  flutter: ">=3.0.0"

dependencies:
  flutter:
    sdk: flutter

  zego_uikit: ^2.28.28
  zego_uikit_signaling_plugin: ^2.8.18
  zego_plugin_adapter: ^2.13.12

  flutter_styled_toast: ^2.2.1
  cached_network_image: ^3.4.1
  statemachine: ^3.3.1
  permission_handler: ^12.0.1
  collection: ^1.18.0
  floating: ^6.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^6.0.0
  import_sorter: ^4.6.0 # run 'flutter pub run import_sorter:main'
  lints: ^6.0.0

flutter:
  assets:
    - assets/icons/
  plugin:
    platforms:
      android:
        package: com.zegocloud.uikit.prebuilt_live_audio_room
        pluginClass: ZegoUIKitPrebuiltLiveAudioRoomPlugin
      ios:
        pluginClass: ZegoUIKitPrebuiltLiveAudioRoomPlugin

topics:
  - audio
  - audio-room
  - audio-chat

linter:
  rules:
    public_member_api_docs: true